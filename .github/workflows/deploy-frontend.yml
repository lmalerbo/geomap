name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build (aponta pro backend em produção)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          GITHUB_PAGES: "true"
        run: npm run build

      # GitHub Pages não faz rewrite de servidor pra SPA — sem isso, F5 (ou
      # link direto) numa rota tipo /mapa/3 vira um 404 de verdade em vez de
      # carregar o app. Copiar index.html pra 404.html faz o GitHub servir o
      # app shell nesse caso (o React Router assume a partir daí); mais
      # simples que o truque de redirect via querystring, cobre o caso real
      # de uso desta PWA (relançar pelo ícone sempre cai no start_url raiz,
      # só o F5 em rota profunda ou link compartilhado depende disso).
      - name: 404.html = index.html (suporte a deep link em SPA)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
